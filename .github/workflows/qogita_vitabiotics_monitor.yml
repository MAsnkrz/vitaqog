name: Qogita Vitabiotics Monitor

on:
  schedule:
    - cron: "*/30 * * * *"  # every 15 minutes
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests playwright beautifulsoup4

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          QOGITA_EMAIL:    ${{ secrets.QOGITA_EMAIL }}
          QOGITA_PASSWORD: ${{ secrets.QOGITA_PASSWORD }}
          RUN_ONCE: "true"
        run: python qogita_vitabiotics_monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot_qogita_vitabiotics.json baseline_done_vitabiotics.txt 2>/dev/null || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add snapshot_qogita_vitabiotics.json baseline_done_vitabiotics.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update vitabiotics snapshot [skip ci]"
          git push origin HEAD:main
